[workspace]
channels = ["conda-forge", "JosseVanDelm"]
name = "schnitzel"
platforms = ["linux-64"]
version = "0.1.0"

[system-requirements]
libc = { family = "glibc", version = "2.34" }

[tasks]


# Generic dependencies
[dependencies]
ccache = ">=4.12.2,<5"
elfio = ">=3.12,<4"
cmake = ">=4.2.3,<5"
gcc = ">=14,<15"
gxx = ">=14,<15"
cpp-argparse = ">=3.2,<4"
ninja = ">=1.13.2,<2"
riscv-gnu-toolchain = "==2026.01.23nightly"
python = ">=3.12,<3.13"
clang = ">=21.1.8,<22"
lld = ">=21.1.8,<22"
just = ">=1.46.0,<2"
lit = ">=22.1.0,<23"

# Dependencies only needed for rtl development:
[feature.rtl.dependencies]
verilator = "==5.044"
openjdk = ">=21,<22"

# Dependencies only needed for executorch development:
[feature.executorch.pypi-dependencies]
executorch = ">=1.0.1, <2"
torchgen = ">=0.0.1, <0.0.2"


[environments]
default = ["rtl"]
all = ["rtl", "executorch"]

[pypi-dependencies]
filecheck = ">=1.0.3, <2"
pyyaml = ">=6.0.3, <7"
