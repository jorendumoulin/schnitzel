[workspace]
authors = ["Joren Dumoulin <joren.dumoulin@kuleuven.be>"]
channels = ["conda-forge"]
name = "schnitzel"
platforms = ["linux-64"]
version = "0.1.0"

[system-requirements]
libc = { family = "glibc", version = "2.34" }

[tasks]

[dependencies]
python = ">=3.12,<3.13"
gcc = ">=14,<15"
gxx = ">=14,<15"

[pypi-dependencies]
executorch = ">=1.0.1, <2"
torchgen = ">=0.0.1, <0.0.2"
