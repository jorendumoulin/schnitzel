default = ["torch", "riscv-gnu-toolchain"]
torch = ["torch", "riscv-gnu-toolchain"]
rtl = ["compiler", "riscv-gnu-toolchain"]
all = ["compiler", "torch", "riscv-gnu-toolchain"]
minimal = []
