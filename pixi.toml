[workspace]
channels = ["conda-forge", "bioconda", "kuleuven-micas", "KEKE046", "JosseVanDelm"]
name = "schnitzel"
platforms = ["linux-64"]
version = "0.1.0"

[system-requirements]
libc = { family = "glibc", version = "2.34" }

[tasks]

[dependencies]
elfio = ">=3.12,<4"
cpp-argparse = ">=3.2,<4"
riscv-gnu-toolchain = "==2026.01.23nightly"
python = ">=3.12,<3.13"
just = ">=1.46.0,<2"
lit = ">=22.1.0,<23"

[pypi-dependencies]
schnitzel = { path = ".", editable = true }
filecheck = ">=1.0.3, <2"
pyyaml = ">=6.0.3, <7"

# Compiler dependencies, these should preferably be installed locally
# but are available here for quick starts and ci
[feature.compiler.dependencies]
cmake = ">=4.2.3,<5"
ccache = ">=4.12.2,<5"
clang = ">=21.1.8,<22"
ninja = ">=1.13.2,<2"
lld = ">=21.1.8,<22"
verilator = "==5.044"
openjdk = ">=21,<22"

[feature.torch.pypi-dependencies]
executorch = ">=1.1.0, <2"
torch = { version = "==2.10.0", index = "https://download.pytorch.org/whl/cpu" }
torchgen = ">=0.0.1, <0.0.2"

# TODO: merge old snax-mlir dependencies

