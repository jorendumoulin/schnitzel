name: Build
on:
  push:
    branches:
      - main
  pull_request:
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache
    steps:
      - uses: actions/checkout@v5
      - uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-${{ github.sha }}
          restore-keys: ccache-
      - uses: prefix-dev/setup-pixi@v0.9.4
        with:
          activate-environment: true
          cache: true
          cache-write: ${{ github.event_name == 'push' && github.ref_name == 'main' }}
      - name: Checkout Selective Submodules
        run: git submodule update --init --recursive --depth 1 submodules/cva6 submodules/ibex submodules/printf
      - name: Generate Verilog
        run: just generate-verilog
      - name: Configure All Build Systems
        run: just configure
      - name: Build Everything
        run: just build
      - uses: actions/upload-artifact@v4
        with:
          name: build-outputs
          path: build/
  run-apps:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v5
      - uses: prefix-dev/setup-pixi@v0.9.4
        with:
          activate-environment: true
          cache: true
      - uses: actions/download-artifact@v4
        with:
          name: build-outputs
          path: .
      - name: Run App Tests
        run: lit tests/apps -v
