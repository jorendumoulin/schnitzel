name: Test
on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  filechecks:
    name: Filechecks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: prefix-dev/setup-pixi@v0.9.4
        with:
          cache: true
          cache-write: ${{ github.event_name == 'push' && github.ref_name == 'main' }}
      - name: Test with lit
        shell: bash
        run: |
          pixi run lit tests/filecheck -v
  pytest:
    name: Pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: prefix-dev/setup-pixi@v0.9.4
        with:
          cache: true
          cache-write: ${{ github.event_name == 'push' && github.ref_name == 'main' }}
      - name: Test with pytest
        shell: bash
        run: |
          pixi run python -m pytest .
